<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CV Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f8;
      color: #333;
      margin: 0;
      padding: 0;
    }
    .container {
      max-width: 900px;
      margin: 2rem auto;
      padding: 1.5rem;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }
    h1 {
      margin-top: 0;
      color: #1f3a93;
    }
    .section {
      margin-bottom: 1.25rem;
    }
    .section h2 {
      margin-bottom: 0.5rem;
      color: #2f4f4f;
    }
    .button-wrap {
      text-align: center;
      margin-top: 1.5rem;
    }
    button {
      background: #1f3a93;
      color: white;
      border: none;
      padding: 0.85rem 1.4rem;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover {
      background: #162c6a;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>John Doe</h1>
    <div class="section">
      <h2>Bio</h2>
      <p>Hello! I am John, a web developer with a passion for creating clean, simple, and user-friendly websites. I enjoy working on front-end design and small projects that bring ideas to life.</p>
    </div>
    <div class="section">
      <h2>Hobbies</h2>
      <ul>
        <li>Reading books</li>
        <li>Traveling</li>
        <li>Photography</li>
        <li>Learning new technologies</li>
      </ul>
    </div>
    <div class="button-wrap">
      <button onclick="alert('Hello! Nice to meet you.')">Click Button</button>
    </div>
  </div>
</body>
</html>
